site_name: Jason Docs
site_description: Blog and documentation powered by MkDocs Material
site_url: https://jasonkasih.github.io/hello-world/
repo_url: https://github.com/jasonkasih/hello-world
repo_name: jasonkasih/hello-world

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: deep orange

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Articles:
      - Welcome: articles/welcome.md
      - Writing Your Next Post: articles/writing-your-next-post.md